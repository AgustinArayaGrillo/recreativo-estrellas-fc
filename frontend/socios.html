<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socios — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="dashboard.html">
      <img src="../assets/escudo/escudo.png" alt="REFC" />
      <span>Recreativo <em>Estrellas</em> F.C.</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Inicio</a></li>
      <li><a href="socios.html" class="active">Socios</a></li>
      <li><a href="pagos.html">Pagos</a></li>
    </ul>
    <div class="navbar-user">
      <span id="navUsuario">—</span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="main-content">

    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <h1>Padrón de <span>Socios</span></h1>
        <p>Listado completo — Recreativo Estrellas F.C.</p>
      </div>
      <a href="nuevo-socio.html" class="btn btn-primary">+ Nuevo socio</a>
    </div>

    <!-- FILTROS -->
    <div class="card" style="margin-bottom:1.5rem">
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center">
        <input
          type="text"
          id="filtroTexto"
          placeholder="Buscar por nombre o DNI..."
          oninput="filtrarSocios()"
          style="flex:1;min-width:200px;background:var(--negro);border:1.5px solid var(--negro-borde);border-radius:8px;padding:0.6rem 1rem;color:var(--blanco);font-family:'Poppins',sans-serif;font-size:0.875rem"
        />
        <select id="filtroEstado" onchange="filtrarSocios()"
          style="background:var(--negro);border:1.5px solid var(--negro-borde);border-radius:8px;padding:0.6rem 1rem;color:var(--blanco);font-family:'Poppins',sans-serif;font-size:0.875rem">
          <option value="">Todos los estados</option>
          <option value="al-dia">Al día</option>
          <option value="deuda">Con deuda</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="limpiarFiltros()">Limpiar</button>
        <span id="contadorFiltro" style="color:var(--gris);font-size:0.8rem"></span>
      </div>
    </div>

    <!-- TABLA -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre y apellido</th>
              <th>DNI</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Cuotas pagas</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaSocios"></tbody>
        </table>
      </div>
      <!-- PAGINACIÓN -->
      <div id="paginacion" style="display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:1rem 0;flex-wrap:wrap"></div>
    </div>

  </div>

  <!-- MODAL EDITAR -->
  <div class="modal-overlay" id="modalEditar">
    <div class="modal">
      <div class="modal-header">
        <h3>EDITAR SOCIO</h3>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>
      <div class="form-grid" id="modalForm"></div>
      <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- MODAL ELIMINAR -->
  <div class="modal-overlay" id="modalEliminar">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>CONFIRMAR</h3>
        <button class="modal-close" onclick="cerrarModalEliminar()">✕</button>
      </div>
      <p style="color:var(--gris-claro);margin-bottom:1.5rem;font-size:0.9rem">
        ¿Estás seguro de que querés eliminar a <strong id="nombreEliminar" style="color:var(--blanco)"></strong> del padrón?
      </p>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="cerrarModalEliminar()">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarEliminar()">Eliminar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API   = '/api';
    const token = sessionStorage.getItem('refc_token');
    const session = JSON.parse(sessionStorage.getItem('refc_user') || 'null');
    if (!session || !token) window.location.href = 'login.html';
    document.getElementById('navUsuario').textContent = session?.usuario || '';

    function logout() {
      sessionStorage.removeItem('refc_user');
      sessionStorage.removeItem('refc_token');
      window.location.href = 'login.html';
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    let socioEditando   = null;
    let socioEliminando = null;
    let sociosActuales  = [];
    let paginaActual    = 1;
    const POR_PAGINA    = 20;

    function dniDisplay(dni) {
      return (!dni || dni.startsWith('SINDNI-')) ? '—' : dni;
    }

    function renderTabla(lista) {
      sociosActuales = lista;
      paginaActual   = 1;
      renderPagina();
    }

    function renderPagina() {
      const tbody  = document.getElementById('tablaSocios');
      const total  = sociosActuales.length;
      const totalPags = Math.ceil(total / POR_PAGINA);
      const desde  = (paginaActual - 1) * POR_PAGINA;
      const pagina = sociosActuales.slice(desde, desde + POR_PAGINA);

      document.getElementById('contadorFiltro').textContent = `${total} socio${total !== 1 ? 's' : ''}`;

      if (total === 0) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><p>No se encontraron socios con ese filtro.</p></div></td></tr>`;
        document.getElementById('paginacion').innerHTML = '';
        return;
      }

      tbody.innerHTML = pagina.map(s => `
        <tr>
          <td style="color:var(--gris)">${s.id}</td>
          <td style="color:var(--blanco);font-weight:500">${s.nombre} ${s.apellido}</td>
          <td>${dniDisplay(s.dni)}</td>
          <td>${s.telefono || '—'}</td>
          <td style="color:var(--gris)">${s.email || '—'}</td>
          <td style="color:var(--amarillo);font-weight:600">${s.cuotas_pagas}</td>
          <td>
            <span class="badge ${s.estado === 'al-dia' ? 'badge-verde' : 'badge-naranja'}">
              ${s.estado === 'al-dia' ? 'Al día' : 'Con deuda'}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:0.5rem">
              <button class="btn btn-secondary btn-sm" onclick="abrirEditar(${s.id})">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="abrirEliminar(${s.id}, '${s.nombre} ${s.apellido}')">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');

      // Paginación
      const pag = document.getElementById('paginacion');
      if (totalPags <= 1) { pag.innerHTML = ''; return; }

      const btnStyle = (activo) => `style="padding:0.35rem 0.75rem;border-radius:6px;border:1.5px solid ${activo ? 'var(--amarillo)' : 'var(--negro-borde)'};background:${activo ? 'var(--amarillo)' : 'transparent'};color:${activo ? 'var(--negro)' : 'var(--gris-claro)'};font-weight:${activo ? '700' : '400'};cursor:pointer;font-family:'Poppins',sans-serif;font-size:0.8rem"`;

      let html = `<button ${btnStyle(false)} onclick="irPagina(${paginaActual - 1})" ${paginaActual === 1 ? 'disabled' : ''}>‹ Ant</button>`;

      for (let i = 1; i <= totalPags; i++) {
        if (totalPags > 7 && i > 2 && i < totalPags - 1 && Math.abs(i - paginaActual) > 1) {
          if (i === 3 || i === totalPags - 2) html += `<span style="color:var(--gris);padding:0 0.2rem">…</span>`;
          continue;
        }
        html += `<button ${btnStyle(i === paginaActual)} onclick="irPagina(${i})">${i}</button>`;
      }

      html += `<button ${btnStyle(false)} onclick="irPagina(${paginaActual + 1})" ${paginaActual === totalPags ? 'disabled' : ''}>Sig ›</button>`;
      pag.innerHTML = html;
    }

    function irPagina(n) {
      const total = Math.ceil(sociosActuales.length / POR_PAGINA);
      if (n < 1 || n > total) return;
      paginaActual = n;
      renderPagina();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function filtrarSocios() {
      const texto  = document.getElementById('filtroTexto').value.trim();
      const estado = document.getElementById('filtroEstado').value;

      const params = new URLSearchParams();
      if (texto)  params.append('q', texto);
      if (estado) params.append('estado', estado);

      try {
        const res    = await fetch(`${API}/socios?${params}`, { headers: authHeaders() });
        const socios = await res.json();
        renderTabla(socios);
      } catch {
        showToast('Error al cargar socios.', 'error');
      }
    }

    function limpiarFiltros() {
      document.getElementById('filtroTexto').value = '';
      document.getElementById('filtroEstado').value = '';
      filtrarSocios();
    }

    // ─── EDITAR ───
    async function abrirEditar(id) {
      try {
        const res   = await fetch(`${API}/socios/${id}`, { headers: authHeaders() });
        socioEditando = await res.json();

        document.getElementById('modalForm').innerHTML = `
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="editNombre" value="${socioEditando.nombre}" />
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" id="editApellido" value="${socioEditando.apellido}" />
          </div>
          <div class="form-group">
            <label>DNI</label>
            <input type="text" id="editDNI" value="${socioEditando.dni?.startsWith('SINDNI-') ? '' : (socioEditando.dni || '')}" placeholder="Sin DNI registrado" />
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" id="editTel" value="${socioEditando.telefono}" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="editMail" value="${socioEditando.email || ''}" />
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="editEstado">
              <option value="al-dia" ${socioEditando.estado === 'al-dia' ? 'selected' : ''}>Al día</option>
              <option value="deuda"  ${socioEditando.estado === 'deuda'  ? 'selected' : ''}>Con deuda</option>
            </select>
          </div>
        `;

        document.getElementById('modalEditar').classList.add('open');
      } catch {
        showToast('Error al cargar datos del socio.', 'error');
      }
    }

    function cerrarModal() {
      document.getElementById('modalEditar').classList.remove('open');
      socioEditando = null;
    }

    async function guardarEdicion() {
      if (!socioEditando) return;

      const body = {
        nombre:   document.getElementById('editNombre').value.trim(),
        apellido: document.getElementById('editApellido').value.trim(),
        dni:      document.getElementById('editDNI').value.trim(),
        telefono: document.getElementById('editTel').value.trim(),
        email:    document.getElementById('editMail').value.trim(),
        estado:   document.getElementById('editEstado').value,
        categoria: socioEditando.categoria,
      };

      try {
        const res = await fetch(`${API}/socios/${socioEditando.id}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error();
        cerrarModal();
        filtrarSocios();
        showToast('Socio actualizado correctamente.', 'success');
      } catch {
        showToast('Error al guardar los cambios.', 'error');
      }
    }

    // ─── ELIMINAR ───
    function abrirEliminar(id, nombre) {
      socioEliminando = id;
      document.getElementById('nombreEliminar').textContent = nombre;
      document.getElementById('modalEliminar').classList.add('open');
    }

    function cerrarModalEliminar() {
      document.getElementById('modalEliminar').classList.remove('open');
      socioEliminando = null;
    }

    async function confirmarEliminar() {
      if (!socioEliminando) return;
      try {
        const res = await fetch(`${API}/socios/${socioEliminando}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (!res.ok) throw new Error();
        cerrarModalEliminar();
        filtrarSocios();
        showToast('Socio eliminado del padrón.', 'error');
      } catch {
        showToast('Error al eliminar el socio.', 'error');
      }
    }

    // ─── TOAST ───
    function showToast(msg, tipo = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    document.getElementById('modalEditar').addEventListener('click', e => { if (e.target === e.currentTarget) cerrarModal(); });
    document.getElementById('modalEliminar').addEventListener('click', e => { if (e.target === e.currentTarget) cerrarModalEliminar(); });

    filtrarSocios();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacerme Socio — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--negro);
      position: relative;
      overflow-x: hidden;
      padding: 2rem 1rem;
    }

    .bg-cover {
      position: fixed;
      inset: 0;
      background: url('../assets/fotos/488160418_1471092664186469_7818115757013939030_n.jpg') center/cover no-repeat;
      filter: blur(4px) brightness(0.18);
      transform: scale(1.05);
      z-index: 0;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.6), rgba(13,13,13,0.95));
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
    }

    .club-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .club-header img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 0 20px rgba(245,197,24,0.4));
    }

    .club-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 2px;
      color: var(--blanco);
      line-height: 1.1;
    }

    .club-header h1 span { color: var(--amarillo); }

    .club-header p {
      color: var(--gris);
      font-size: 0.78rem;
      margin-top: 0.3rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: var(--amarillo);
      margin: 0.9rem auto;
      border-radius: 2px;
    }

    .card {
      background: rgba(26,26,26,0.92);
      border: 1px solid var(--negro-borde);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--blanco);
      margin-bottom: 0.25rem;
    }

    .card-sub {
      font-size: 0.8rem;
      color: var(--gris);
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gris-claro);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
    }

    .form-group input {
      width: 100%;
      background: var(--negro);
      border: 1.5px solid var(--negro-borde);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--blanco);
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--amarillo);
    }

    .precio-box {
      background: rgba(245,197,24,0.08);
      border: 1px solid rgba(245,197,24,0.25);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .precio-box .label {
      font-size: 0.8rem;
      color: var(--gris-claro);
    }

    .precio-box .label strong {
      display: block;
      font-size: 0.72rem;
      color: var(--gris);
      font-weight: 400;
      margin-top: 2px;
    }

    .precio-box .monto {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--amarillo);
      letter-spacing: 1px;
    }

    .btn-pagar {
      width: 100%;
      background: var(--amarillo);
      color: var(--negro);
      border: none;
      border-radius: 8px;
      padding: 0.9rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-pagar:hover {
      background: var(--amarillo-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,197,24,0.3);
    }

    .btn-pagar:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .mp-logo {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    .alerta {
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      margin-top: 1rem;
      display: none;
    }

    .alerta.error {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--rojo-error);
    }

    .alerta.visible { display: block; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--gris);
    }

    .footer-link a {
      color: var(--amarillo);
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-cover"></div>
  <div class="bg-gradient"></div>

  <div class="container">

    <div class="club-header">
      <img src="../assets/escudo/escudo.png" alt="Escudo Recreativo Estrellas FC" />
      <h1>Recreativo <span>Estrellas</span> F.C.</h1>
      <p>Jovita, Córdoba</p>
      <div class="divider"></div>
    </div>

    <div class="card">
      <div class="card-title">Hacerme socio</div>
      <p class="card-sub">Completá tus datos y pagá la primera cuota para unirte al club.</p>

      <form id="formSocio" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="nombre" placeholder="Juan" required />
          </div>
          <div class="form-group">
            <label>Apellido *</label>
            <input type="text" id="apellido" placeholder="Pérez" required />
          </div>
          <div class="form-group">
            <label>DNI *</label>
            <input type="text" id="dni" placeholder="12345678" inputmode="numeric" pattern="[0-9]+" required />
          </div>
          <div class="form-group">
            <label>Teléfono *</label>
            <input type="tel" id="telefono" placeholder="3513012345" required />
          </div>
        </div>

        <div class="precio-box">
          <div class="label">
            Primera cuota
            <strong>Incluye alta como socio</strong>
          </div>
          <div class="monto">$10.000</div>
        </div>

        <button type="submit" class="btn-pagar" id="btnPagar">
          PAGAR CON MERCADO PAGO
        </button>

        <div class="alerta error" id="alertaError"></div>
      </form>
    </div>

    <div class="footer-link">
      ¿Ya sos socio? <a href="login.html">Ingresá al sistema</a>
    </div>

  </div>

  <script>
    const API = '/api';

    async function handleSubmit(e) {
      e.preventDefault();

      const btn    = document.getElementById('btnPagar');
      const alerta = document.getElementById('alertaError');
      alerta.classList.remove('visible');

      const body = {
        nombre:   document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        dni:      document.getElementById('dni').value.trim(),
        telefono: document.getElementById('telefono').value.trim()
      };

      btn.textContent = 'PROCESANDO...';
      btn.disabled = true;

      try {
        const res  = await fetch(`${API}/solicitudes`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error al procesar la solicitud');

        // Redirigir al checkout de Mercado Pago
        window.location.href = data.init_point;

      } catch (err) {
        alerta.textContent = err.message;
        alerta.classList.add('visible');
        btn.textContent = 'PAGAR CON MERCADO PAGO';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago Exitoso — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--negro);
    }
    .bg-cover {
      position: fixed; inset: 0;
      background: url('../assets/fotos/488160418_1471092664186469_7818115757013939030_n.jpg') center/cover no-repeat;
      filter: blur(4px) brightness(0.18);
      transform: scale(1.05); z-index: 0;
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.6), rgba(13,13,13,0.95));
      z-index: 1;
    }
    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 420px;
      padding: 1rem; text-align: center;
    }
    .icono {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .card {
      background: rgba(26,26,26,0.92);
      border: 1px solid rgba(46,204,113,0.3);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
    }
    .card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--verde-ok);
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    .card p {
      color: var(--gris-claro);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .card p strong { color: var(--amarillo); }
    .divider {
      width: 50px; height: 2px;
      background: var(--verde-ok);
      margin: 1.25rem auto; border-radius: 2px;
    }
    .escudo {
      width: 60px; height: 60px;
      object-fit: contain; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 15px rgba(245,197,24,0.35));
    }
    .nota {
      background: rgba(46,204,113,0.07);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--gris-claro);
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="bg-cover"></div>
  <div class="bg-gradient"></div>
  <div class="container">
    <img class="escudo" src="../assets/escudo/escudo.png" alt="Escudo REFC" />
    <div class="card">
      <div class="icono">✅</div>
      <h2>¡Bienvenido al club!</h2>
      <div class="divider"></div>
      <p>Tu pago fue <strong>aprobado</strong> correctamente.</p>
      <p>Ya sos socio del <strong>Recreativo Estrellas F.C.</strong> y tu primera cuota quedó registrada.</p>
      <div class="nota">
        📋 Tu alta puede demorar unos minutos en procesarse. Si tenés alguna consulta comunicate con la comisión del club.
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuota Pagada — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background-color: var(--negro);
    }
    .bg-cover {
      position: fixed; inset: 0;
      background: url('../assets/fotos/488160418_1471092664186469_7818115757013939030_n.jpg') center/cover no-repeat;
      filter: blur(4px) brightness(0.18); transform: scale(1.05); z-index: 0;
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.6), rgba(13,13,13,0.95));
      z-index: 1;
    }
    .container { position: relative; z-index: 2; width: 100%; max-width: 420px; padding: 1rem; text-align: center; }
    .escudo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px rgba(245,197,24,0.35)); }
    .card {
      background: rgba(26,26,26,0.92);
      border: 1px solid rgba(46,204,113,0.3);
      border-radius: 16px; padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
    }
    .icono { font-size: 4rem; margin-bottom: 1rem; }
    .card h2 {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
      color: var(--verde-ok); letter-spacing: 2px; margin-bottom: 0.75rem;
    }
    .divider { width: 50px; height: 2px; background: var(--verde-ok); margin: 1.25rem auto; border-radius: 2px; }
    .card p { color: var(--gris-claro); font-size: 0.88rem; line-height: 1.6; margin-bottom: 0.5rem; }
    .card p strong { color: var(--amarillo); }
    .info-cuota {
      background: rgba(245,197,24,0.06); border: 1px solid rgba(245,197,24,0.2);
      border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.82rem;
      color: var(--gris-claro); margin-top: 1rem; text-align: left;
    }
    .info-cuota span { color: var(--amarillo); font-weight: 600; }
    .estado-box {
      background: rgba(46,204,113,0.07); border: 1px solid rgba(46,204,113,0.2);
      border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.82rem;
      color: var(--gris-claro); margin-top: 1rem;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--amarillo);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-portal {
      display: inline-block; margin-top: 1.25rem;
      background: var(--amarillo); color: var(--negro);
      font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
      letter-spacing: 1.5px; padding: 0.65rem 1.5rem;
      border-radius: 8px; text-decoration: none; transition: opacity 0.2s;
    }
    .btn-portal:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="bg-cover"></div>
  <div class="bg-gradient"></div>
  <div class="container">
    <img class="escudo" src="../assets/escudo/escudo.png" alt="Escudo REFC" />
    <div class="card">
      <div class="icono">✅</div>
      <h2>¡Cuota pagada!</h2>
      <div class="divider"></div>
      <p>Tu pago fue <strong>aprobado</strong> correctamente.</p>

      <div id="estadoBox" class="estado-box">
        <span class="spinner"></span> Confirmando el pago...
      </div>
      <div id="infoCuota" style="display:none;" class="info-cuota"></div>
      <div id="btnPortal" style="display:none;"></div>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const paymentId   = params.get('payment_id') || params.get('collection_id');
      const extRef      = params.get('external_reference') || '';
      const status      = params.get('status') || params.get('collection_status');

      const estadoEl = document.getElementById('estadoBox');
      const infoEl   = document.getElementById('infoCuota');
      const btnEl    = document.getElementById('btnPortal');

      if (!paymentId || !extRef.startsWith('cuota:')) {
        estadoEl.innerHTML = '✅ Tu pago fue registrado. Si no se refleja en tu cuenta en unos minutos, comunicate con la comisión.';
        btnEl.innerHTML = '<a href="/login.html" class="btn-portal">🪪 Ver mi cuenta</a>';
        btnEl.style.display = 'block';
        return;
      }

      if (status && status !== 'approved') {
        estadoEl.innerHTML = '⚠️ El pago está pendiente de aprobación. Te avisaremos cuando se confirme.';
        return;
      }

      const [, socioId, cuotaId] = extRef.split(':');

      try {
        const resp = await fetch('/api/mp-cuota-confirmar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ payment_id: paymentId, socio_id: socioId, cuota_id: cuotaId })
        });
        const data = await resp.json();

        if (data.ok) {
          estadoEl.innerHTML = '✅ Tu pago quedó registrado correctamente.';
          if (data.socio || data.mes) {
            infoEl.innerHTML = `
              ${data.socio ? `<div style="margin-bottom:0.3rem;">👤 <span>${data.socio.nombre} ${data.socio.apellido}</span></div>` : ''}
              ${data.mes ? `<div>📅 Mes pagado: <span>${data.mes}</span></div>` : ''}
              <div>💳 Estado: <span>Al día ✓</span></div>
            `;
            infoEl.style.display = 'block';
          }
          btnEl.innerHTML = '<a href="/login.html" class="btn-portal">🪪 Ver mi cuenta</a>';
          btnEl.style.display = 'block';
        } else {
          estadoEl.innerHTML = '⚠️ No se pudo confirmar automáticamente. Comunicate con la comisión.';
        }
      } catch {
        estadoEl.innerHTML = '✅ Tu pago fue recibido. Puede demorar unos minutos en reflejarse.';
        btnEl.innerHTML = '<a href="/login.html" class="btn-portal">🪪 Ver mi cuenta</a>';
        btnEl.style.display = 'block';
      }
    })();
  </script>
</body>
</html>

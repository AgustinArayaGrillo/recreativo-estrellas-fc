<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recreativo Estrellas F.C. — Acceso</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--negro);
      position: relative;
      overflow: hidden;
    }

    /* Fondo con foto difuminada */
    .bg-cover {
      position: fixed;
      inset: 0;
      background: url('../assets/fotos/488160418_1471092664186469_7818115757013939030_n.jpg') center/cover no-repeat;
      filter: blur(4px) brightness(0.18);
      transform: scale(1.05);
      z-index: 0;
    }

    /* Degradado vertical encima */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.6), rgba(13,13,13,0.95));
      z-index: 1;
    }

    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    /* Header del club */
    .club-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .club-header img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(245,197,24,0.4));
    }

    .club-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--blanco);
      line-height: 1.1;
    }

    .club-header h1 span {
      color: var(--amarillo);
    }

    .club-header p {
      color: var(--gris);
      font-size: 0.8rem;
      margin-top: 0.35rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Separador */
    .divider {
      width: 50px;
      height: 2px;
      background: var(--amarillo);
      margin: 1rem auto;
      border-radius: 2px;
    }

    /* Card del formulario */
    .login-card {
      background: rgba(26,26,26,0.92);
      border: 1px solid var(--negro-borde);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    .login-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--blanco);
      margin-bottom: 0.3rem;
    }

    .login-card p {
      font-size: 0.8rem;
      color: var(--gris);
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gris-claro);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    .form-group .input-icon {
      position: relative;
    }

    .form-group .input-icon span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--gris);
    }

    .form-group input {
      width: 100%;
      background: var(--negro);
      border: 1.5px solid var(--negro-borde);
      border-radius: 8px;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      color: var(--blanco);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--amarillo);
    }

    .btn-login {
      width: 100%;
      background: var(--amarillo);
      color: var(--negro);
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: var(--amarillo-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,197,24,0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .login-error {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--rojo-error);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      margin-top: 1rem;
      display: none;
    }

    .login-error.visible {
      display: block;
    }

    .footer-login {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--gris);
    }

    .footer-login strong {
      color: var(--amarillo);
    }
  </style>
</head>
<body>

  <div class="bg-cover"></div>
  <div class="bg-gradient"></div>

  <div class="login-container">

    <div class="club-header">
      <img src="../assets/escudo/escudo.png" alt="Escudo Recreativo Estrellas FC" />
      <h1>Recreativo <span>Estrellas</span> F.C.</h1>
      <p>Jovita, Córdoba</p>
      <div class="divider"></div>
    </div>

    <div class="login-card">
      <h2>Acceso al sistema</h2>
      <p>Ingresá con tus credenciales de administrador</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Usuario</label>
          <div class="input-icon">
            <span>👤</span>
            <input type="text" id="usuario" placeholder="Ingresá tu usuario" autocomplete="username" required />
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-icon" style="position:relative;">
            <span>🔒</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required style="padding-right:2.75rem;" />
            <span id="togglePassword" onclick="togglePass()" style="
              position:absolute; left:auto; right:12px; top:50%; transform:translateY(-50%);
              cursor:pointer; font-size:1rem; user-select:none;
            ">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">INGRESAR</button>

        <div class="login-error" id="loginError">
          Usuario o contraseña incorrectos.
        </div>
      </form>
    </div>

    <div class="footer-login">
      Sistema de Gestión de Socios &mdash; <strong>REFC</strong>
    </div>

    <!-- Botones acceso socio -->
    <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
      <a href="hacerse-socio.html" style="
        flex:1; display:inline-block; text-align:center;
        background: transparent; color: var(--amarillo);
        border: 2px solid var(--amarillo); border-radius: 8px;
        padding: 0.75rem 0.5rem;
        font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
        letter-spacing: 1.5px; text-decoration: none; transition: all 0.2s;
      "
      onmouseover="this.style.background='var(--amarillo)';this.style.color='var(--negro)'"
      onmouseout="this.style.background='transparent';this.style.color='var(--amarillo)'"
      >⚽ QUIERO SER SOCIO</a>

      <button onclick="toggleSocioPanel()" style="
        flex:1; background: transparent; color: var(--blanco);
        border: 2px solid var(--negro-borde); border-radius: 8px;
        padding: 0.75rem 0.5rem;
        font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
        letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s;
      "
      onmouseover="this.style.borderColor='var(--blanco)'"
      onmouseout="this.style.borderColor='var(--negro-borde)'"
      >🪪 YA SOY SOCIO</button>
    </div>

    <!-- Panel socio -->
    <div id="socioPanel" style="display:none; margin-top:0.75rem;">
      <div class="login-card">
        <h2>Mi estado de cuenta</h2>
        <p>Ingresá tu DNI para ver tus cuotas</p>
        <form onsubmit="buscarSocio(event)">
          <div class="form-group">
            <label>DNI</label>
            <div class="input-icon">
              <span>🪪</span>
              <input type="text" id="dniSocio" placeholder="Ej: 40123456" inputmode="numeric" required />
            </div>
          </div>
          <button type="submit" class="btn-login" id="btnSocio">VER MI CUENTA</button>
          <div class="login-error" id="socioError"></div>
        </form>

        <!-- Resultado -->
        <div id="socioResultado" style="display:none; margin-top:1.25rem;">
          <div id="socioHeader" style="display:flex; align-items:center; gap:1rem; background:rgba(245,197,24,0.07); border:1px solid rgba(245,197,24,0.2); border-radius:12px; padding:1rem; margin-bottom:1rem;"></div>
          <div style="font-size:0.7rem; font-weight:600; color:var(--gris); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.6rem;">Cuotas</div>
          <div id="socioCuotas"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API = '/api';

    function togglePass() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('togglePassword');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👁️';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();

      const usuario  = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const btn      = document.getElementById('btnLogin');

      btn.textContent = 'INGRESANDO...';
      btn.disabled = true;
      errorDiv.classList.remove('visible');

      try {
        const res  = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error');

        sessionStorage.setItem('refc_token', data.token);
        sessionStorage.setItem('refc_user', JSON.stringify({ usuario: data.usuario, rol: data.rol }));
        window.location.href = 'dashboard.html';

      } catch (err) {
        errorDiv.textContent = err.message === 'Usuario o contraseña incorrectos'
          ? 'Usuario o contraseña incorrectos.'
          : 'No se pudo conectar con el servidor.';
        errorDiv.classList.add('visible');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        btn.textContent = 'INGRESAR';
        btn.disabled = false;
      }
    }

    if (sessionStorage.getItem('refc_token')) {
      window.location.href = 'dashboard.html';
    }

    function toggleSocioPanel() {
      const panel = document.getElementById('socioPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      if (panel.style.display === 'block') document.getElementById('dniSocio').focus();
    }

    async function buscarSocio(e) {
      e.preventDefault();
      const dni = document.getElementById('dniSocio').value.trim();
      const btn = document.getElementById('btnSocio');
      const err = document.getElementById('socioError');
      const resultado = document.getElementById('socioResultado');

      btn.textContent = 'BUSCANDO...';
      btn.disabled = true;
      err.classList.remove('visible');
      resultado.style.display = 'none';

      try {
        const res  = await fetch(`${API}/socio-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dni })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');

        const { socio, cuotas } = data;

        // Header
        const estadoHTML = socio.estado === 'al-dia'
          ? '<span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:600;background:rgba(39,174,96,0.15);color:#27ae60;border:1px solid rgba(39,174,96,0.3);">✓ Al día</span>'
          : '<span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:600;background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.3);">⚠ Con deuda</span>';

        document.getElementById('socioHeader').innerHTML = `
          <div style="width:48px;height:48px;border-radius:50%;background:var(--amarillo);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--negro);flex-shrink:0;">${socio.nombre[0]}${socio.apellido[0]}</div>
          <div>
            <div style="font-size:0.95rem;font-weight:700;color:var(--blanco);">${socio.nombre} ${socio.apellido}</div>
            <div style="font-size:0.75rem;color:var(--gris);margin-top:0.1rem;">DNI ${socio.dni} · ${socio.categoria}</div>
            ${estadoHTML}
          </div>`;

        // Cuotas
        const cuotasEl = document.getElementById('socioCuotas');
        if (!cuotas.length) {
          cuotasEl.innerHTML = '<div style="text-align:center;color:var(--gris);font-size:0.85rem;padding:1rem 0;">Sin cuotas registradas aún.</div>';
        } else {
          cuotasEl.innerHTML = cuotas.map(c => {
            const monto = c.monto ? `$${Number(c.monto).toLocaleString('es-AR')}` : '';
            const badge = c.pagado
              ? '<span style="font-size:0.7rem;font-weight:600;padding:0.15rem 0.55rem;border-radius:20px;background:rgba(39,174,96,0.15);color:#27ae60;">Pagada</span>'
              : '<span style="font-size:0.7rem;font-weight:600;padding:0.15rem 0.55rem;border-radius:20px;background:rgba(231,76,60,0.15);color:#e74c3c;">Pendiente</span>';
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.9rem;border-radius:8px;margin-bottom:0.35rem;background:rgba(255,255,255,0.03);border:1px solid var(--negro-borde);">
              <div>
                <div style="font-size:0.88rem;color:var(--blanco);font-weight:500;">${c.mes}</div>
                ${monto ? `<div style="font-size:0.78rem;color:var(--gris);">${monto}</div>` : ''}
              </div>
              ${badge}
            </div>`;
          }).join('');
        }

        resultado.style.display = 'block';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('visible');
      } finally {
        btn.textContent = 'VER MI CUENTA';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>

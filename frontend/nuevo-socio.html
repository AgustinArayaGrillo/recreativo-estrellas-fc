<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Socio — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="dashboard.html">
      <img src="../assets/escudo/escudo.png" alt="REFC" />
      <span>Recreativo <em>Estrellas</em> F.C.</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Inicio</a></li>
      <li><a href="socios.html" class="active">Socios</a></li>
      <li><a href="pagos.html">Pagos</a></li>
    </ul>
    <div class="navbar-user">
      <span id="navUsuario">—</span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="main-content">

    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <h1>Nuevo <span>Socio</span></h1>
        <p>Completá los datos para registrar un nuevo socio en el padrón</p>
      </div>
      <a href="socios.html" class="btn btn-secondary">← Volver al listado</a>
    </div>

    <div class="card">

      <form id="formNuevoSocio" onsubmit="guardarSocio(event)" novalidate>

        <!-- Datos personales -->
        <div style="margin-bottom:1.5rem">
          <h3 style="font-size:0.8rem;color:var(--amarillo);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--negro-borde)">
            Datos personales
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Nombre *</label>
              <input type="text" id="nombre" placeholder="Ej: Juan" required />
              <span class="form-error" id="errNombre"></span>
            </div>
            <div class="form-group">
              <label>Apellido *</label>
              <input type="text" id="apellido" placeholder="Ej: Pérez" required />
              <span class="form-error" id="errApellido"></span>
            </div>
            <div class="form-group">
              <label>DNI *</label>
              <input type="number" id="dni" placeholder="Ej: 35123456" min="1000000" max="99999999" required />
              <span class="form-error" id="errDNI"></span>
            </div>
            <div class="form-group">
              <label>Fecha de nacimiento</label>
              <input type="date" id="fechaNac" />
            </div>
          </div>
        </div>

        <!-- Contacto -->
        <div style="margin-bottom:1.5rem">
          <h3 style="font-size:0.8rem;color:var(--amarillo);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--negro-borde)">
            Contacto
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Teléfono / WhatsApp *</label>
              <input type="tel" id="telefono" placeholder="Ej: 3564-123456" required />
              <span class="form-error" id="errTelefono"></span>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="Ej: juan@gmail.com" />
              <span class="form-error" id="errEmail"></span>
            </div>
            <div class="form-group" style="grid-column: 1 / -1">
              <label>Dirección</label>
              <input type="text" id="direccion" placeholder="Ej: Sarmiento 456, Jovita" />
            </div>
          </div>
        </div>

        <!-- Datos de socio -->
        <div style="margin-bottom:1.5rem">
          <h3 style="font-size:0.8rem;color:var(--amarillo);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--negro-borde)">
            Datos de membresía
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Fecha de ingreso *</label>
              <input type="date" id="fechaIngreso" required />
              <span class="form-error" id="errFechaIngreso"></span>
            </div>
            <div class="form-group">
              <label>Categoría</label>
              <select id="categoria">
                <option value="general">General</option>
                <option value="junior">Junior (hasta 18 años)</option>
                <option value="jubilado">Jubilado / Pensionado</option>
                <option value="adherente">Adherente</option>
              </select>
            </div>
            <div class="form-group">
              <label>Cuotas pagas al ingresar</label>
              <input type="number" id="cuotasIniciales" value="0" min="0" max="12" />
            </div>
            <div class="form-group">
              <label>Estado inicial</label>
              <select id="estadoInicial">
                <option value="al-dia">Al día</option>
                <option value="deuda">Con deuda</option>
              </select>
            </div>
            <div class="form-group" style="grid-column: 1 / -1">
              <label>Observaciones</label>
              <textarea id="observaciones" rows="3" placeholder="Notas adicionales sobre el socio..." style="resize:vertical"></textarea>
            </div>
          </div>
        </div>

        <!-- Botones -->
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;flex-wrap:wrap">
          <a href="socios.html" class="btn btn-secondary">Cancelar</a>
          <button type="reset" class="btn btn-secondary" onclick="limpiarForm()">Limpiar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardar">Registrar socio</button>
        </div>

      </form>
    </div>

  </div>

  <!-- MODAL ÉXITO -->
  <div class="modal-overlay" id="modalExito">
    <div class="modal" style="max-width:420px;text-align:center">
      <div style="font-size:3rem;margin-bottom:1rem">✅</div>
      <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;color:var(--amarillo);margin-bottom:0.5rem">SOCIO REGISTRADO</h3>
      <p style="color:var(--gris-claro);font-size:0.9rem;margin-bottom:0.25rem" id="exitoNombre"></p>
      <p style="color:var(--gris);font-size:0.8rem;margin-bottom:1.75rem" id="exitoDNI"></p>
      <div style="display:flex;gap:0.75rem;justify-content:center">
        <button class="btn btn-secondary" onclick="nuevoFormulario()">Agregar otro</button>
        <a href="socios.html" class="btn btn-primary">Ver padrón</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API   = '/api';
    const token = sessionStorage.getItem('refc_token');
    const session = JSON.parse(sessionStorage.getItem('refc_user') || 'null');
    if (!session || !token) window.location.href = 'login.html';
    document.getElementById('navUsuario').textContent = session?.usuario || '';

    function logout() {
      sessionStorage.removeItem('refc_user');
      sessionStorage.removeItem('refc_token');
      window.location.href = 'login.html';
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    document.getElementById('fechaIngreso').value = new Date().toISOString().split('T')[0];

    function limpiarErrores() {
      ['errNombre','errApellido','errDNI','errTelefono','errEmail','errFechaIngreso'].forEach(id => {
        document.getElementById(id).textContent = '';
      });
      ['nombre','apellido','dni','telefono','email','fechaIngreso'].forEach(id => {
        document.getElementById(id).classList.remove('error');
      });
    }

    function setError(campo, msg) {
      document.getElementById('err' + campo).textContent = msg;
      const input = document.getElementById(campo.toLowerCase());
      if (input) input.classList.add('error');
    }

    async function guardarSocio(e) {
      e.preventDefault();
      limpiarErrores();

      const nombre   = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const dni      = document.getElementById('dni').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const email    = document.getElementById('email').value.trim();
      const fechaIng = document.getElementById('fechaIngreso').value;

      let valido = true;
      if (!nombre)   { setError('Nombre',   'El nombre es obligatorio.');    valido = false; }
      if (!apellido) { setError('Apellido', 'El apellido es obligatorio.');  valido = false; }
      if (!dni || dni.length < 7 || dni.length > 8) {
        setError('DNI', 'Ingresá un DNI válido (7 u 8 dígitos).'); valido = false;
      }
      if (!telefono) { setError('Telefono', 'El teléfono es obligatorio.'); valido = false; }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setError('Email', 'El email no es válido.'); valido = false;
      }
      if (!fechaIng) { setError('FechaIngreso', 'La fecha de ingreso es obligatoria.'); valido = false; }

      if (!valido) { showToast('Corregí los errores antes de continuar.', 'error'); return; }

      const btn = document.getElementById('btnGuardar');
      btn.textContent = 'Guardando...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/socios`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            nombre, apellido, dni, telefono,
            email:         email || null,
            direccion:     document.getElementById('direccion').value.trim() || null,
            fecha_nac:     document.getElementById('fechaNac').value || null,
            fecha_ingreso: fechaIng,
            categoria:     document.getElementById('categoria').value,
            estado:        document.getElementById('estadoInicial').value,
            observaciones: document.getElementById('observaciones').value.trim() || null,
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');

        document.getElementById('exitoNombre').textContent = `${nombre} ${apellido}`;
        document.getElementById('exitoDNI').textContent    = `DNI: ${dni}`;
        document.getElementById('modalExito').classList.add('open');

      } catch (err) {
        showToast(err.message === 'Ya existe un socio con ese DNI'
          ? 'Ya existe un socio registrado con ese DNI.'
          : 'Error al guardar. Verificá la conexión.', 'error');
      } finally {
        btn.textContent = 'Registrar socio';
        btn.disabled = false;
      }
    }

    function nuevoFormulario() {
      document.getElementById('modalExito').classList.remove('open');
      document.getElementById('formNuevoSocio').reset();
      document.getElementById('fechaIngreso').value = new Date().toISOString().split('T')[0];
      limpiarErrores();
    }

    function limpiarForm() { limpiarErrores(); }

    function showToast(msg, tipo = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }
  </script>

</body>
</html>

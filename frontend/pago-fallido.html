<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago No Completado — Recreativo Estrellas F.C.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background-color: var(--negro);
    }
    .bg-cover {
      position: fixed; inset: 0;
      background: url('../assets/fotos/488160418_1471092664186469_7818115757013939030_n.jpg') center/cover no-repeat;
      filter: blur(4px) brightness(0.18);
      transform: scale(1.05); z-index: 0;
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.6), rgba(13,13,13,0.95));
      z-index: 1;
    }
    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 420px;
      padding: 1rem; text-align: center;
    }
    .card {
      background: rgba(26,26,26,0.92);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
    }
    .icono { font-size: 4rem; margin-bottom: 1rem; }
    .card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--rojo-error);
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    .card p {
      color: var(--gris-claro);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .divider {
      width: 50px; height: 2px;
      background: var(--rojo-error);
      margin: 1.25rem auto; border-radius: 2px;
    }
    .escudo {
      width: 60px; height: 60px;
      object-fit: contain; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 15px rgba(245,197,24,0.35));
    }
    .btn-reintentar {
      display: inline-block;
      background: var(--amarillo);
      color: var(--negro);
      border: none;
      border-radius: 8px;
      padding: 0.8rem 2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 2px;
      cursor: pointer;
      text-decoration: none;
      margin-top: 1.25rem;
      transition: all 0.2s;
    }
    .btn-reintentar:hover {
      background: var(--amarillo-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="bg-cover"></div>
  <div class="bg-gradient"></div>
  <div class="container">
    <img class="escudo" src="../assets/escudo/escudo.png" alt="Escudo REFC" />
    <div class="card">
      <div class="icono">❌</div>
      <h2>Pago no completado</h2>
      <div class="divider"></div>
      <p>El pago no pudo procesarse o fue cancelado.</p>
      <p>Podés intentarlo nuevamente cuando quieras.</p>
      <a href="hacerse-socio.html" class="btn-reintentar">INTENTAR DE NUEVO</a>
    </div>
  </div>
</body>
</html>
